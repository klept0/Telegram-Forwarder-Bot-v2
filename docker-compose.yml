services:
  telegram-forwarder:
    build: .
    container_name: telegram-forwarder-bot
    restart: unless-stopped
    volumes:
      - ./resources:/app/resources
      - ./media:/app/media
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    networks:
      - telegram-network
    healthcheck:
      test: ["CMD", "python", "-c", "print('Bot is healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build: .
    container_name: telegram-forwarder-web
    restart: unless-stopped
    command: ["python", "web/app.py"]
    environment:
      # Required: shared secret the dashboard's /api/* routes require via
      # the X-API-Key header. The app refuses to serve API requests if unset.
      - API_KEY=${API_KEY:?API_KEY must be set to run the web dashboard}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
    volumes:
      - ./resources:/app/resources
      - ./sessions:/app/sessions
    ports:
      # Bound to localhost by default; put a reverse proxy in front (or
      # change this) before exposing the dashboard beyond this machine.
      - "127.0.0.1:8000:8000"
    networks:
      - telegram-network
    depends_on:
      - telegram-forwarder

networks:
  telegram-network:
    driver: bridge